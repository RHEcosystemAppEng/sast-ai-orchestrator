apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sast-ai-orchestrator-prod
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/name: sast-ai-orchestrator-prod
    app.kubernetes.io/part-of: sast-ai
    environment: production
  finalizers:
    - resources-finalizer.argocd.argoproj.io/background
spec:
  project: default
  source:
    repoURL: GITHUB_REPO_URL_PLACEHOLDER
    targetRevision: v0.0.2  # Use specific version tag for production
    path: deploy/sast-ai-chart
    helm:
      releaseName: sast-ai-orchestrator-prod
      valueFiles:
        - values.yaml
        - values-prod.yaml
      parameters:
        - name: app.env.SAST_AI_WORKFLOW_NAMESPACE
          value: TARGET_NAMESPACE_PLACEHOLDER
  destination:
    server: https://kubernetes.default.svc
    namespace: TARGET_NAMESPACE_PLACEHOLDER
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
  revisionHistoryLimit: 10
